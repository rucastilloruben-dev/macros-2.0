<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Safari Indoor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      border-bottom: 2px solid #c8a84b;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      color: #c8a84b;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header a {
      color: #c8a84b;
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid #c8a84b;
      padding: 6px 14px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    header a:hover {
      background: #c8a84b;
      color: #0d0d0d;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Catálogo de Productos — Safari Indoor</h1>
    <a href="https://drive.google.com/uc?export=download&id=1zLgM8SwObx2zT7SlPV3oZXzYvGnwp0hi" target="_blank">
      ⬇ Descargar PDF
    </a>
  </header>

  <iframe
    src="https://drive.google.com/file/d/1zLgM8SwObx2zT7SlPV3oZXzYvGnwp0hi/preview"
    allow="autoplay"
    loading="lazy"
  ></iframe>

</body>
</html>
